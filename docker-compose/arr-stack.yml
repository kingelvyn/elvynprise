version: "3.92"

#---------------------------------------------------------------------#
#     Homarr - A simple, yet powerful dashboard for your server.      #
#---------------------------------------------------------------------#
services:
  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Optional, only if you want docker integration
      - /media/arr/homarr/appdata:/appdata
    environment:
      - SECRET_ENCRYPTION_KEY= # <--- can be generated with `openssl rand -hex 32`
    ports:
      - '7575:7575'


############################
# RADARR
############################

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    #network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /media/arr/radarr/config:/config
      - /mnt/elvynspace/data/media/movies:/movies #optional
      - /mnt/elvynspace/data/media/anime-movies:/anime-movies #optional
      - /mnt/elvynspace/data/torrents:/downloads #optional
    restart: unless-stopped
    ports:
      - '7878:7878'

    
############################
# SONARR
############################

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    #network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /media/arr/sonarr/config:/config
      - /mnt/elvynspace/data/media/shows:/tv #optional
      - /mnt/elvynspace/data/torrents:/downloads #optional
    restart: unless-stopped
    ports:
      - '8989:8989'


############################
# SONARR-ANIME
############################

  sonarr-anime:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr-anime
    #network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /media/arr/sonarr-anime/config:/config
      - /mnt/elvynspace/data/media/anime:/anime #optional
      - /mnt/elvynspace/data/torrents:/downloads #optional
    restart: unless-stopped
    ports:
      - '9090:8989'

    
############################
# PROWLARR
############################

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    #network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
    volumes:
      - /media/arr/prowlarr/config:/config
    restart: unless-stopped
    ports:
      - '9696:9696'


    
############################
# QBITTORRENT		
############################

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    #network_mode: "service:gluetun"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Chicago
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - /media/arr/qbittorrent/config:/config
      - /mnt/elvynspace/data/downloads:/downloads #optional
    restart: unless-stopped
    ports:
      - '8080:8080'
      - '6881:6881'

    
############################
# JELLYSEER	/ SEERR	
############################

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    environment:
      - LOG_LEVEL=debug
      - TZ=America/Chicago
      - PORT=5055 #optional
    ports:
      - 5055:5055
    volumes:
      - /media/arr/seerr/app/config:/app/config
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/status || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    restart: unless-stopped
    depends_on:
      - radarr
      - sonarr


############################
# JELLYFIN
############################

  jellyfin:
      image: jellyfin/jellyfin:latest
      container_name: jellyfin
      environment:
        - PUID=1000
        - PGID=1000
        - TZ=America/Chicago 
      #group_add:
      #  - "108" # HW Acceleration
      #  - "44"
      devices:
        - /dev/dri:/dev/dri # HW Acceleration
      volumes:
        - /media/arr/jellyfin/config:/config
        - /mnt/elvynspace/data/media/movies:/data/movies
        - /mnt/elvynspace/data/media/shows:/data/shows
        - /mnt/elvynspace/data/media/anime:/data/anime
        - /mnt/elvynspace/data/media/anime-movies:/data/anime-movies
      ports:
        - 8096:8096
        - 8920:8920 #optional
        - 7359:7359/udp #optional
        - 1900:1900/udp #optional
      restart: unless-stopped


